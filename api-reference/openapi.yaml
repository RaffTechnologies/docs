                      $ref: '#/components/schemas/SSHKey'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - SSH Keys
      summary: Create SSH key
      description: |
        Add an SSH public key to your account. Pass the key on VM create via the `ssh_keys` array to enable key-based login.

        Supported key types: RSA, ECDSA, Ed25519. The `key_type` field on the response is parsed automatically from the public key.
      operationId: createSSHKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSSHKeyRequest'
      responses:
        '201':
          description: SSH key created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/SSHKey'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/ssh-keys/{id}:
    get:
      tags:
        - SSH Keys
      summary: Get SSH key
      description: Get details of a specific SSH key.
      operationId: getSSHKey
      parameters:
        - name: id
          in: path
          required: true
          description: SSH key ID (UUID)
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: SSH key details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/SSHKey'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - SSH Keys
      summary: Update SSH key
      description: Update an SSH key's display name. The public key itself cannot be changed — delete and recreate to rotate.
      operationId: updateSSHKey
      parameters:
        - name: id
          in: path
          required: true
          description: SSH key ID (UUID)
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSSHKeyRequest'
      responses:
        '200':
          description: SSH key updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/SSHKey'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - SSH Keys
      summary: Delete SSH key
      description: Permanently delete an SSH key from your account. VMs that already have this key installed continue to accept it until the key is removed from the VM's `~/.ssh/authorized_keys`.
      operationId: deleteSSHKey
      parameters:
        - name: id
          in: path
          required: true
          description: SSH key ID (UUID)
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: SSH key deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/SSHKey'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/members:
    get:
      tags:
        - Members
      summary: List account members
      description: List all members of the authenticated account, including pending invitations.
      operationId: listMembers
      parameters:
        - name: status
          in: query
          description: Filter by member status
          schema:
            type: string
            enum: [pending, active, suspended]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of account members
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Member'
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - Members
      summary: Add account member
      description: |
        Add a new member to the account. There are three ways:

        - **Email invitation** — pass `email` only. An invitation is sent; the recipient accepts it from the dashboard. The member appears in `pending` status until accepted. Equivalent to calling `POST /api/v1/invitations` directly.
        - **Direct add** — pass `target_user_id` for a user who already has an account on Raff (e.g. a project-only user being promoted to account member).
        - **API key** — pass `api_key_id` to make an existing API key a member with the given role. Mutually exclusive with `email` and `target_user_id`.
      operationId: addMember
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMemberRequest'
      responses:
        '201':
          description: Member added (or invitation sent)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Member'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/members/{id}:
    get:
      tags:
        - Members
      summary: Get account member
      description: Get details of a specific account member.
      operationId: getMember
      parameters:
        - name: id
          in: path
          required: true
          description: Member ID (UUID)
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Member details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Member'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
        - Members
      summary: Update account member
      description: Update a member's role or status. Pass only the fields you want to change.
      operationId: updateMember
      parameters:
        - name: id
          in: path
          required: true
          description: Member ID (UUID)
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMemberRequest'
      responses:
        '200':
          description: Member updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Member'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Members
      summary: Remove account member
      description: Remove a member from the account. Account owners cannot be removed via this endpoint — transfer ownership first from the dashboard.
      operationId: removeMember
      parameters:
        - name: id
          in: path
          required: true
          description: Member ID (UUID)
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Member removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/projects/{id}/members:
    get:
      tags:
        - Project Members
      summary: List project members
      description: List members of a specific project.
      operationId: listProjectMembers
      parameters:
        - $ref: '#/components/parameters/ProjectIDPath'
        - name: status
