                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Volume'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Volumes
      summary: Delete volume
      description: |
        Permanently delete a volume. The volume must be detached from any VM before deletion.

        ## Billing

        For subscription volumes, the remaining prepaid balance is refunded pro-rata (hourly precision) to your account balance.
      operationId: deleteVolume
      parameters:
        - name: id
          in: path
          required: true
          description: Volume ID
          schema:
            type: integer
        - $ref: '#/components/parameters/ProjectIDHeader'
      responses:
