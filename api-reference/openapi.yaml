        - name: id
          in: path
          required: true
          description: Backup ID (UUID)
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/ProjectIDHeader'
      responses:
        '200':
          description: Backup deleted
          content:
            application/json:
