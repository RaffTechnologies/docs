  /api/v1/backups/{id}/restore:
    post:
      tags:
        - Backups
      summary: Restore backup
      description: |
        Restore a VM from a backup. The restore runs asynchronously — the response returns immediately with a `pending` status.

        The target VM is overwritten in place. The VM should be powered off before restoring.
      operationId: restoreBackup
      parameters:
        - name: id
          in: path
          required: true
          description: Backup ID (UUID)
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/ProjectIDHeader'
      responses:
        '202':
          description: Backup restore accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Backup'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/backup-schedules:
    get:
      tags:
        - Backup Schedules
      summary: List backup schedules
      description: |
        List backup schedules for the authenticated account. Filter by VM.

        Pass `X-Project-ID` to scope the list to a single project. When omitted, returns schedules across every project the API key has access to.
      operationId: listBackupSchedules
      parameters:
        - name: X-Project-ID
          in: header
          required: false
          description: Optional project ID to scope the list. Omit to list across all accessible projects.
          schema:
            type: string
            format: uuid
        - name: vm_id
          in: query
          description: Filter by VM UUID
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of backup schedules
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BackupSchedule'
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - Backup Schedules
      summary: Create backup schedule
      description: |
        Create a recurring backup schedule for a VM.

        - **Daily** — set `type` to `daily`. Runs every day at `time`.
        - **Weekly** — set `type` to `weekly` and pass `day_of_week` (Monday–Sunday). Runs on that day at `time`.

        `keep_count` controls retention — older backups beyond this count are pruned automatically.
      operationId: createBackupSchedule
      parameters:
        - $ref: '#/components/parameters/ProjectIDHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBackupScheduleRequest'
      responses:
        '201':
          description: Backup schedule created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/BackupSchedule'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/backup-schedules/{id}:
    get:
      tags:
        - Backup Schedules
      summary: Get backup schedule
      description: Get details of a specific backup schedule.
      operationId: getBackupSchedule
      parameters:
        - name: id
          in: path
          required: true
          description: Backup schedule ID — the `id` field returned by [List Backup Schedules](#tag/Backup-Schedules/operation/listBackupSchedules) or [Create Backup Schedule](#tag/Backup-Schedules/operation/createBackupSchedule).
          schema:
            type: integer
        - $ref: '#/components/parameters/ProjectIDHeader'
      responses:
        '200':
          description: Backup schedule details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/BackupSchedule'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
        - Backup Schedules
      summary: Update backup schedule
      description: Update one or more fields on an existing backup schedule. Omitted fields are unchanged.
      operationId: updateBackupSchedule
      parameters:
        - name: id
          in: path
          required: true
          description: Backup schedule ID — the `id` field returned by [List Backup Schedules](#tag/Backup-Schedules/operation/listBackupSchedules) or [Create Backup Schedule](#tag/Backup-Schedules/operation/createBackupSchedule).
          schema:
            type: integer
        - $ref: '#/components/parameters/ProjectIDHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBackupScheduleRequest'
      responses:
        '200':
          description: Backup schedule updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/BackupSchedule'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Backup Schedules
      summary: Delete backup schedule
      description: Delete a backup schedule. Existing backups created by this schedule are retained.
      operationId: deleteBackupSchedule
      parameters:
        - name: id
          in: path
          required: true
          description: Backup schedule ID — the `id` field returned by [List Backup Schedules](#tag/Backup-Schedules/operation/listBackupSchedules) or [Create Backup Schedule](#tag/Backup-Schedules/operation/createBackupSchedule).
          schema:
            type: integer
        - $ref: '#/components/parameters/ProjectIDHeader'
      responses:
        '200':
          description: Backup schedule deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/ssh-keys:
    get:
      tags:
        - SSH Keys
      summary: List SSH keys
      description: List SSH keys for the authenticated account. SSH keys are account-level — no project scoping.
      operationId: listSSHKeys
      responses:
        '200':
          description: List of SSH keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
